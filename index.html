<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonFocus</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#2563EB; --blue-l:#EFF4FF; --blue-d:#1D4ED8;
  --green:#059669; --green-l:#ECFDF5;
  --amber:#D97706; --amber-l:#FFFBEB;
  --red:#DC2626; --red-l:#FEF2F2;
  --bg:#F1F5F9; --white:#FFFFFF;
  --border:#E2E8F0; --border-2:#CBD5E1;
  --text:#0F172A; --text-2:#334155; --text-3:#64748B; --text-4:#94A3B8;
  --sh-sm:0 1px 2px rgba(15,23,42,.06);
  --sh:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --sh-md:0 4px 12px rgba(15,23,42,.10);
  --r:10px; --r-sm:6px; --r-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;display:flex;}
.sidebar{width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);}
.logo-mark{display:flex;align-items:center;gap:9px;}
.logo-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:16px;height:16px;fill:white;}
.logo-text{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.logo-text span{color:var(--blue);}
.nav{padding:12px 10px;flex:1;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r-sm);cursor:pointer;color:var(--text-3);font-size:13.5px;font-weight:500;border:none;background:transparent;width:100%;text-align:left;transition:all .12s;}
.nav-item:hover{background:var(--bg);color:var(--text-2);}
.nav-item.active{background:var(--blue-l);color:var(--blue);}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.sidebar-bottom{border-top:1px solid var(--border);padding:12px 10px;}
.sync-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg);color:var(--text-3);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;width:100%;transition:all .12s;}
.sync-btn:hover{border-color:var(--blue);color:var(--blue);}
.sync-btn.syncing{color:var(--amber);border-color:var(--amber);}
.sync-btn.ok{color:var(--green);border-color:var(--green);}
.sync-btn.error{color:var(--red);border-color:var(--red);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.sync-dot.pulse{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.sidebar-user{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.user-name{font-size:13px;font-weight:600;color:var(--text-2);}
.user-role{font-size:11px;color:var(--text-4);}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.page-title{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.topbar-actions{display:flex;gap:8px;}
.content{flex:1;overflow-y:auto;padding:24px 28px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn-primary{background:var(--blue);color:white;box-shadow:var(--sh-sm);}
.btn-primary:hover{background:var(--blue-d);}
.btn-ghost{background:var(--white);color:var(--text-2);border:1px solid var(--border);box-shadow:var(--sh-sm);}
.btn-ghost:hover{border-color:var(--border-2);}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid #FECACA;}
.btn-danger:hover{background:#FEE2E2;}
.btn-sm{padding:5px 12px;font-size:12px;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-sm);padding:16px 18px;}
.config-banner{background:var(--amber-l);border:1px solid #FCD34D;border-radius:var(--r);padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.config-banner.hidden{display:none;}
.config-banner input{flex:1;min-width:180px;background:var(--white);border:1px solid var(--border-2);border-radius:var(--r-sm);color:var(--text);font-family:inherit;font-size:12.5px;padding:7px 11px;outline:none;}
.config-banner input:focus{border-color:var(--blue);}
.config-label{font-size:12px;font-weight:600;color:#92400E;white-space:nowrap;}
.section-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-4);display:flex;align-items:center;gap:8px;margin:20px 0 8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.action-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);box-shadow:var(--sh-sm);cursor:pointer;transition:all .12s;margin-bottom:4px;}
.action-row:hover{border-color:var(--border-2);box-shadow:var(--sh);background:#FAFBFF;}
.action-row-left{flex:1;min-width:0;}
.action-name{font-size:13.5px;font-weight:500;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.action-meta{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap;}
.action-project{font-size:11px;color:var(--text-3);font-weight:500;}
.due-chip{font-size:11px;color:var(--text-3);}
.due-chip.overdue{color:var(--red);font-weight:600;}
.done-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-4);transition:all .12s;flex-shrink:0;font-size:13px;}
.done-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-l);}
.project-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-sm);margin-bottom:12px;overflow:hidden;}
.project-header{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s;}
.project-header:hover{background:var(--bg);}
.project-card.open .project-header{border-bottom:1px solid var(--border);}
.proj-color-bar{width:4px;height:40px;border-radius:2px;flex-shrink:0;background:var(--blue);}
.project-info{flex:1;min-width:0;}
.project-name-text{font-size:14px;font-weight:700;}
.project-meta{display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap;}
.project-actions-wrap{display:none;}
.project-card.open .project-actions-wrap{display:block;}
.proj-action-item{display:flex;align-items:center;gap:10px;padding:9px 18px 9px 34px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.proj-action-item:last-child{border-bottom:none;}
.proj-action-item:hover{background:var(--bg);}
.proj-action-name{flex:1;font-size:13px;color:var(--text-2);}
.chevron{font-size:11px;color:var(--text-4);transition:transform .2s;flex-shrink:0;}
.project-card.open .chevron{transform:rotate(90deg);}
.progress-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.progress-bar{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;}
.progress-pct{font-size:11px;font-weight:600;color:var(--text-3);min-width:28px;text-align:right;}
.kanban-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filter-select{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text-2);font-family:inherit;font-size:13px;padding:7px 12px;outline:none;cursor:pointer;box-shadow:var(--sh-sm);}
.filter-select:focus{border-color:var(--blue);}
.kanban-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;align-items:flex-start;}
.kanban-col{flex-shrink:0;width:260px;}
.col-header{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm) var(--r-sm) 0 0;border-bottom:none;cursor:pointer;user-select:none;}
.col-title{font-size:12.5px;font-weight:700;flex:1;}
.col-count{font-size:11px;font-weight:600;background:var(--border);color:var(--text-3);padding:1px 7px;border-radius:20px;}
.col-toggle{font-size:11px;color:var(--text-4);transition:transform .2s;}
.kanban-col.collapsed .col-toggle{transform:rotate(-90deg);}
.col-body{background:var(--bg);border:1px solid var(--border);border-radius:0 0 var(--r-sm) var(--r-sm);padding:8px;min-height:60px;display:flex;flex-direction:column;gap:6px;}
.kanban-col.collapsed .col-body{display:none;}
.k-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;cursor:pointer;transition:all .12s;box-shadow:var(--sh-sm);}
.k-card:hover{box-shadow:var(--sh);border-color:var(--border-2);}
.k-card-name{font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:7px;line-height:1.4;}
.k-card-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.k-project{font-size:11px;color:var(--text-3);font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
.modal-bg.hidden{display:none;}
.modal{background:var(--white);border-radius:var(--r-lg);box-shadow:var(--sh-md);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:28px;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;}
.modal-title{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.modal-close{width:30px;height:30px;border-radius:var(--r-sm);border:none;background:var(--bg);color:var(--text-3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-close:hover{background:var(--border);color:var(--text);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;}
.form-input,.form-select,.form-textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:inherit;font-size:13.5px;padding:9px 12px;outline:none;transition:border-color .12s;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5;}
.form-select{cursor:pointer;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;padding-top:16px;border-top:1px solid var(--border);}
.memo-toolbar{display:flex;gap:4px;margin-bottom:6px;}
.memo-tool{padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--white);cursor:pointer;font-size:12px;font-family:inherit;color:var(--text-2);transition:all .1s;}
.memo-tool:hover{background:var(--blue-l);border-color:var(--blue);color:var(--blue);}
.memo-editor{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;min-height:90px;outline:none;font-family:inherit;font-size:13.5px;line-height:1.6;}
.memo-editor:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.memo-editor b,.memo-editor strong{font-weight:700;}
.memo-editor i,.memo-editor em{font-style:italic;}
.memo-editor ul,.memo-editor ol{padding-left:18px;}
.params-section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-sm);margin-bottom:14px;overflow:hidden;}
.params-head{padding:14px 18px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;}
.params-body{padding:14px 18px;}
.param-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg);border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:6px;}
.param-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.param-label{flex:1;font-size:13px;}
.param-del{background:none;border:none;color:var(--text-4);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px;transition:all .1s;}
.param-del:hover{color:var(--red);background:var(--red-l);}
.param-add-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.param-add-row input{flex:1;min-width:100px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:inherit;font-size:13px;padding:7px 10px;outline:none;}
.param-add-row input[type="color"]{width:40px;padding:2px;cursor:pointer;}
.empty{padding:40px;text-align:center;color:var(--text-4);font-size:13px;font-style:italic;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:white;padding:10px 18px;border-radius:var(--r-sm);font-size:13px;font-weight:500;box-shadow:var(--sh-md);z-index:200;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon"><svg viewBox="0 0 16 16"><path d="M2 3h12v2H2V3zm0 4h8v2H2V7zm0 4h10v2H2v-2z"/></svg></div>
      <div class="logo-text">Mon<span>Focus</span></div>
    </div>
  </div>
  <nav class="nav">

    <button class="nav-item" onclick="navigate('actions')"><span class="nav-icon">≡</span>Les actions</button>
    <button class="nav-item" onclick="navigate('settings')"><span class="nav-icon">⚙</span>Paramètres</button>
  </nav>

    <button class="sync-btn" id="sync-btn" onclick="syncAll()">

    </button>

<div class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Mes actions</div>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>

      <div class="modal-title" id="modal-project-title">Projet</div>

<script>
var LS_URL='monfocus_script_url', LS_ME='monfocus_me';
var SCRIPT_URL=localStorage.getItem(LS_URL)||'';
var ME=localStorage.getItem(LS_ME)||'Guillaume';
var projects=[], actions=[], params={statuts:[],importances:[],etiquettes:[]};
var currentPage='home', editingActionId=null, editingProjectId=null;
var kbFilters={responsable:'',project:'',importance:'',echeance:''};
var saveTimer=null;

// DEFAULTS
var DEFAULT_STATUTS=[
  {type:'statut',id:'todo',   label:'À faire',  cls:'s-todo',   color:'#64748B'},
  {type:'statut',id:'doing',  label:'En cours', cls:'s-doing',  color:'#2563EB'},
  {type:'statut',id:'blocked',label:'Bloqué',   cls:'s-blocked',color:'#DC2626'},
  {type:'statut',id:'review', label:'À valider',cls:'s-review', color:'#D97706'},
  {type:'statut',id:'done',   label:'Terminé',  cls:'s-done',   color:'#059669'},
  {type:'statut',id:'cancel', label:'Annulé',   cls:'s-cancel', color:'#94A3B8'}
];
var DEFAULT_IMPORTANCES=[
  {type:'importance',id:'minor',   label:'Mineure', cls:'i-minor',   color:'#64748B'},
  {type:'importance',id:'major',   label:'Majeure', cls:'i-major',   color:'#D97706'},
  {type:'importance',id:'critical',label:'Critique',cls:'i-critical',color:'#DC2626'}
];
var DEFAULT_ETIQUETTES=[
  {type:'etiquette',id:'strat', label:'Projet stratégique', cls:'label-strat', color:'#7C3AED'},
  {type:'etiquette',id:'info',  label:'Projet informatique',cls:'label-info',  color:'#2563EB'},
  {type:'etiquette',id:'tech',  label:'Projet technique',   cls:'label-tech',  color:'#0891B2'},
  {type:'etiquette',id:'com',   label:'Projet commercial',  cls:'label-com',   color:'#059669'},
  {type:'etiquette',id:'rh',    label:'RH',                 cls:'label-rh',    color:'#D97706'},
  {type:'etiquette',id:'divers',label:'Divers',             cls:'label-divers',color:'#64748B'}
];
params.statuts=DEFAULT_STATUTS; params.importances=DEFAULT_IMPORTANCES; params.etiquettes=DEFAULT_ETIQUETTES;

// JSONP - identique à la v2 qui fonctionnait
var cbCounter = 0;
function jsonp(url) {
  return new Promise(function(resolve, reject) {
    var cbName = '_mf_cb_' + (++cbCounter);
    var script = document.createElement('script');
    var timeout = setTimeout(function() {
      cleanup();
      reject(new Error('Timeout'));
    }, 10000);
    window[cbName] = function(data) {
      cleanup();
      if (data.error) reject(new Error(data.error));
      else resolve(data);
    };
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onerror = function() { cleanup(); reject(new Error('Script error')); };
    script.src = url + '&callback=' + cbName;
    document.head.appendChild(script);
  });
}
function apiGet(action) {
  return jsonp(SCRIPT_URL + '?action=' + action);
}
function apiSave(action, data) {
  return new Promise(function(resolve, reject) {
    var form = document.createElement('form');
    form.method = 'POST';
    form.action = SCRIPT_URL;
    form.target = '_mf_frame_' + (++cbCounter);
    var iframe = document.createElement('iframe');
    iframe.name = form.target;
    iframe.style.display = 'none';
    var inputAction = document.createElement('input');
    inputAction.type = 'hidden';
    inputAction.name = 'action';
    inputAction.value = action;
    var inputData = document.createElement('input');
    inputData.type = 'hidden';
    inputData.name = 'data';
    inputData.value = JSON.stringify(data);
    form.appendChild(inputAction);
    form.appendChild(inputData);
    document.body.appendChild(iframe);
    document.body.appendChild(form);
    var t = setTimeout(function() {
      cleanup();
      resolve({ ok: true }); // on considère OK après timeout
    }, 8000);
    iframe.onload = function() { cleanup(); resolve({ ok: true }); };
    function cleanup() {
      clearTimeout(t);
      if (form.parentNode) form.parentNode.removeChild(form);
      if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
    }
    form.submit();
  });
}

function setSyncStatus(state,label){
  var btn=document.getElementById('sync-btn'), dot=document.getElementById('sync-dot');
  document.getElementById('sync-label').textContent=label;
  btn.className='sync-btn '+state;
  dot.className='sync-dot'+(state==='syncing'?' pulse':'');
}

function syncAll(){
  if(!SCRIPT_URL)return;
  setSyncStatus('syncing','Chargement…');
  apiGet('getAll').then(function(res)  {
    projects=res.projects||[];
    actions=res.actions||[];
    var p=res.params||[];
    var st=p.filter(function(x){return x.type==='statut';});
    var im=p.filter(function(x){return x.type==='importance';});
    var et=p.filter(function(x){return x.type==='etiquette';});
    function fixIds(arr) {
        return arr.map(function(x) {
            if(x.id === null || x.id === undefined) {
                // Reconstruire l'id depuis le cls (ex: "s-todo" -> "todo", "i-minor" -> "minor")
                x.id = x.cls ? x.cls.replace(/^[a-z]+-/, '') : '';
            }
            return x;
        });
    }
if(st.length) params.statuts=fixIds(st);
if(im.length) params.importances=fixIds(im);
if(et.length) params.etiquettes=fixIds(et);
    setSyncStatus('ok','Sync '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
    navigate(currentPage);
  }).catch(function(e){setSyncStatus('error','Erreur sync');console.error(e);});
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    if(!SCRIPT_URL)return;
    setSyncStatus('syncing','Sauvegarde…');
    var allP=params.statuts.concat(params.importances).concat(params.etiquettes);
    Promise.all([apiSave('saveProjects',projects),apiSave('saveActions',actions),apiSave('saveParams',allP)])
      .then(function(){setSyncStatus('ok','Sauvegardé '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));})
      .catch(function(e){setSyncStatus('error','Erreur save');console.error(e);});
  },1500);
}

function saveScriptUrl(){

  var me=document.getElementById('cfg-me').value.trim();
  if(!url)return;
  SCRIPT_URL=url; if(me)ME=me;

// NAVIGATION
function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  document.querySelectorAll('.nav-item')[{home:0,projects:1,actions:2,settings:3}[page]].classList.add('active');
  document.getElementById('page-title').textContent={home:'Mes actions',projects:'Les projets',actions:'Les actions',settings:'Paramètres'}[page];
  var tb=document.getElementById('topbar-actions'); tb.innerHTML='';

// HELPERS
function getStatut(id){return params.statuts.find(function(x){return x.id===id;})||{label:id,cls:'',color:'#94A3B8'};}
function getImp(id){return params.importances.find(function(x){return x.id===id;});}
function getEtiq(id){return params.etiquettes.find(function(x){return x.id===id;});}
function getProj(id){return projects.find(function(p){return p.id==id;});}
function tod(){return new Date().toISOString().slice(0,10);}
function fmtD(d){if(!d)return'';var s=String(d).slice(0,10);var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
function nid(){return Date.now()+Math.floor(Math.random()*1000);}
function badgeH(item){
  if(!item)return'';
  var style='background:'+item.color+'22;color:'+item.color+';border:1px solid '+item.color+'44';
  return '<span class="badge" style="'+style+'"><span class="badge-dot" style="background:'+item.color+'"></span>'+esc(item.label)+'</span>';

// HOME
function renderHome(){
  var c=document.getElementById('content'), t=tod();
  var banner=SCRIPT_URL?'<div class="config-banner hidden" id="config-banner"></div>':
    '<div class="config-banner" id="config-banner">'+
    '<span class="config-label">⚙ Configuration</span>'+
    '<input id="cfg-me" placeholder="Ton prénom" value="'+esc(ME)+'" style="max-width:160px">'+
    '<input id="cfg-url" placeholder="URL Apps Script…">'+
    '<button class="btn btn-primary btn-sm" onclick="saveScriptUrl()">Connecter</button>'+
    '</div>';
  var mine=actions.filter(function(a){return a.responsable===ME&&a.statut!=='done'&&a.statut!=='cancel';});
  var wd=mine.filter(function(a){return a.echeance;}).sort(function(a,b){
    if(a.echeance!==b.echeance)return a.echeance<b.echeance?-1:1;
    var ip={critical:0,major:1,minor:2};return(ip[a.importance]||9)-(ip[b.importance]||9);
  });
  var nd=mine.filter(function(a){return!a.echeance;}).sort(function(a,b){return a.id-b.id;});
  var total=mine.length,crit=mine.filter(function(a){return a.importance==='critical';}).length;
  var late=mine.filter(function(a){return a.echeance&&a.echeance<t;}).length;
  var blk=mine.filter(function(a){return a.statut==='blocked';}).length;
  // Bloc urgences
  var urgent = mine.filter(function(a){return a.echeance && a.echeance <= t;});
  var urgentHTML = '';
  if (urgent.length) {
    urgentHTML = '<div style="background:#FEF2F2;border:1.5px solid #FECACA;border-radius:var(--r);padding:16px 18px;margin-bottom:20px;">' +
      '<div style="font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">⚠ Urgent — Aujourd\'hui et en retard</div>' +
      urgent.map(function(a){return ar(a,t);}).join('') +
      '</div>';
  }
  var html=banner+urgentHTML+'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;">'+
      sc(total,'Mes actions','var(--blue)')+sc(crit,'Critiques','var(--red)')+sc(late,'En retard','var(--amber)')+sc(blk,'Bloquées','var(--text-3)')+
      '</div>';
  if(wd.length){html+='<div class="section-label">Avec échéance &nbsp;</div>';html+=wd.map(function(a){return ar(a,t);}).join('');}
  if(nd.length){html+='<div class="section-label" style="margin-top:16px">Sans échéance &nbsp;</div>';html+=nd.map(function(a){return ar(a,t);}).join('');}
  if(!mine.length)html+='<div class="empty">Aucune action en cours pour toi 🎉</div>';
  c.innerHTML=html;
}
function sc(v,l,color){return '<div class="card" style="padding:14px 16px"><div style="font-size:26px;font-weight:700;color:'+color+';line-height:1">'+v+'</div><div style="font-size:11px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px">'+l+'</div></div>';}
function ar(a,t){
  var s=getStatut(a.statut),imp=getImp(a.importance),proj=getProj(a.projectId),late=a.echeance&&a.echeance<t;
  return '<div class="action-row" onclick="openEditAction('+a.id+')">'+
    '<button class="done-btn" onclick="event.stopPropagation();markDone('+a.id+')" title="Terminé">✓</button>'+
    '<div class="action-row-left"><div class="action-name">'+esc(a.name)+'</div>'+
    '<div class="action-meta">'+(proj?'<span class="action-project">◫ '+esc(proj.name)+'</span>':'')+
    (a.echeance?'<span class="due-chip'+(late?' overdue':'')+'">📅 '+fmtD(a.echeance)+'</span>':'')+
    '</div></div>'+(imp?badgeH(imp):'')+badgeH(s)+'</div>';
}
function markDone(id){var a=actions.find(function(x){return x.id==id;});if(a){a.statut='done';toast('Marqué Terminé ✓');scheduleSave();renderHome();}}

    var actH=pa.map(function(a){

// KANBAN
function renderActions(){
  var c=document.getElementById('content'), t=tod();
  var projOpts=projects.map(function(p){return '<option value="'+p.id+'">'+esc(p.name)+'</option>';}).join('');
  var respOpts=['Guillaume','Julien','Christophe','Chloé','Philippe'].map(function(m){return '<option value="'+m+'">'+m+'</option>';}).join('');
  var impOpts=params.importances.map(function(i){return '<option value="'+i.id+'">'+i.label+'</option>';}).join('');
  var weekEnd=new Date(Date.now()+7*86400000).toISOString().slice(0,10);
  var monthEnd=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).toISOString().slice(0,10);
  var html='<div class="kanban-filters">'+
    '<select class="filter-select" onchange="kbFilters.responsable=this.value;renderActions()"><option value="">Tous responsables</option>'+respOpts+'</select>'+
    '<select class="filter-select" onchange="kbFilters.project=this.value;renderActions()"><option value="">Tous projets</option>'+projOpts+'</select>'+
    '<select class="filter-select" onchange="kbFilters.importance=this.value;renderActions()"><option value="">Toutes importances</option>'+impOpts+'</select>'+
    '<select class="filter-select" onchange="kbFilters.echeance=this.value;renderActions()"><option value="">Toutes échéances</option><option value="overdue">En retard</option><option value="today">Aujourd\'hui</option><option value="week">Cette semaine</option><option value="month">Ce mois</option></select>'+
    '<button class="btn btn-ghost btn-sm" onclick="kbFilters={responsable:\'\',project:\'\',importance:\'\',echeance:\'\'};renderActions()">✕</button>'+
    '</div><div class="kanban-board">';
  params.statuts.forEach(function(s){
    var collapsed=s.id==='done'||s.id==='cancel';
    var filtered=actions.filter(function(a){
      if(a.statut!==s.id)return false;
      if(kbFilters.responsable&&a.responsable!==kbFilters.responsable)return false;
      if(kbFilters.project&&a.projectId!=kbFilters.project)return false;
      if(kbFilters.importance&&a.importance!==kbFilters.importance)return false;
      if(kbFilters.echeance){
        if(!a.echeance)return false;
        if(kbFilters.echeance==='overdue'&&a.echeance>=t)return false;
        if(kbFilters.echeance==='today'&&a.echeance!==t)return false;
        if(kbFilters.echeance==='week'&&(a.echeance<t||a.echeance>weekEnd))return false;
        if(kbFilters.echeance==='month'&&(a.echeance<t||a.echeance>monthEnd))return false;
      }
      return true;
    });
    var cards=filtered.map(function(a){
      var imp=getImp(a.importance),proj=getProj(a.projectId),late=a.echeance&&a.echeance<t;
      return '<div class="k-card" onclick="openEditAction('+a.id+')">'+
        '<div class="k-card-name">'+esc(a.name)+'</div>'+
        '<div class="k-card-meta"><span class="k-project">'+(proj?esc(proj.name):'')+'</span>'+
        (imp?badgeH(imp):'')+
        (a.echeance?'<span style="font-size:10px;color:'+(late?'var(--red)':'var(--text-3)')+'">📅'+fmtD(a.echeance)+'</span>':'')+
        '</div></div>';
    }).join('')||'<div style="padding:8px;font-size:11px;color:var(--text-4);font-style:italic;text-align:center">Aucune</div>';
    html+='<div class="kanban-col'+(collapsed?' collapsed':'')+'" id="col-'+s.id+'">'+
      '<div class="col-header" onclick="toggleCol(\''+s.id+'\')"><span class="badge-dot" style="background:'+s.color+'"></span>'+
      '<span class="col-title" style="color:'+s.color+'">'+s.label+'</span>'+
      '<span class="col-count">'+filtered.length+'</span><span class="col-toggle">▼</span></div>'+
      '<div class="col-body">'+cards+'</div></div>';
  });
  html+='</div>';
  c.innerHTML=html;
  var sels=c.querySelectorAll('.filter-select');
  if(sels[0])sels[0].value=kbFilters.responsable;
  if(sels[1])sels[1].value=kbFilters.project;
  if(sels[2])sels[2].value=kbFilters.importance;
  if(sels[3])sels[3].value=kbFilters.echeance;
}
function toggleCol(id){document.getElementById('col-'+id).classList.toggle('collapsed');}

function delParam(type,idx){

}

function saveAction(){
  var name=document.getElementById('fa-name').value.trim();
  var pid=document.getElementById('fa-project').value;
  if(!name){toast('Nom obligatoire');return;}
  if(!pid){toast('Projet obligatoire');return;}

}

function buildProjectForm(p){

  }).join('');
  document.getElementById('modal-project-body').innerHTML=
    '<div class="form-group full"><label class="form-label">Nom *</label><input class="form-input" id="fp-name" value="'+esc(p.name||'')+'" placeholder="Nom du projet"></div>'+
    '<div class="form-group"><label class="form-label">Responsable</label><select class="form-select" id="fp-resp"><option value="">-- Aucun --</option>'+rO+'</select></div>'+
    '<div class="form-group"><label class="form-label">Échéance</label><input class="form-input" type="date" id="fp-due" value="'+(p.echeance||'')+'"></div>'+
    '<div class="form-group full"><label class="form-label">Étiquettes *</label><div style="display:flex;flex-wrap:wrap;gap:10px;padding:10px;background:var(--bg);border-radius:var(--r-sm);border:1px solid var(--border)" id="fp-etiq">'+eC+'</div></div>'+
    '<div class="form-group full"><label class="form-label">Mémo</label>'+
    '<div class="memo-toolbar">'+
    '<button class="memo-tool" onclick="mc(\'fp-memo\',\'bold\')"><b>G</b></button>'+
    '<button class="memo-tool" onclick="mc(\'fp-memo\',\'italic\')"><i>I</i></button>'+
    '<button class="memo-tool" onclick="mc(\'fp-memo\',\'insertUnorderedList\')">• Liste</button>'+
    '<button class="memo-tool" onclick="mc(\'fp-memo\',\'insertOrderedList\')">1. Liste</button>'+
    '</div><div class="memo-editor" id="fp-memo" contenteditable="true">'+(p.memo||'')+'</div></div>';
  document.getElementById('modal-project-footer').innerHTML=
    (editingProjectId?'<button class="btn btn-danger btn-sm" onclick="delProject()">Supprimer</button>':'')+
    '<button class="btn btn-ghost btn-sm" onclick="closeModal(\'modal-project\')">Annuler</button>'+
    '<button class="btn btn-primary btn-sm" onclick="saveProject()">Enregistrer</button>';
}
function saveProject(){
  var name=document.getElementById('fp-name').value.trim();
  if(!name){toast('Nom obligatoire');return;}
  var etiq=Array.from(document.querySelectorAll('#fp-etiq input:checked')).map(function(x){return x.value;});
  if(!etiq.length){toast('Au moins une étiquette requise');return;}
  var data={name:name,etiquettes:etiq,responsable:document.getElementById('fp-resp').value,
    echeance:document.getElementById('fp-due').value||null,memo:document.getElementById('fp-memo').innerHTML};
  if(editingProjectId){Object.assign(projects.find(function(x){return x.id==editingProjectId;}),data);toast('Projet mis à jour');}
  else{data.id=nid();projects.push(data);toast('Projet créé');}
  closeModal('modal-project'); scheduleSave(); navigate(currentPage);
}
function delProject(){
  if(!editingProjectId||!confirm('Supprimer ce projet et ses actions ?'))return;
  var id=editingProjectId;
  projects=projects.filter(function(x){return x.id!=id;});
  actions=actions.filter(function(x){return x.projectId!=id;});
  toast('Projet supprimé'); closeModal('modal-project'); scheduleSave(); navigate(currentPage);
}

// INIT
document.querySelectorAll('.modal-bg').forEach(function(bg){
  bg.addEventListener('click',function(e){if(e.target===bg)bg.classList.add('hidden');});
});
updateUser();
if(SCRIPT_URL){setSyncStatus('syncing','Connexion…');syncAll();}
else{setSyncStatus('config','À configurer');navigate('home');}
</script>
