<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonFocus v4 — Import Trello</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#2563EB;--blue-l:#EFF4FF;--blue-d:#1D4ED8;--green:#059669;--green-l:#ECFDF5;--amber:#D97706;--amber-l:#FFFBEB;--red:#DC2626;--red-l:#FEF2F2;--teal:#0891B2;--bg:#F1F5F9;--white:#fff;--border:#E2E8F0;--border-2:#CBD5E1;--text:#0F172A;--text-2:#334155;--text-3:#64748B;--text-4:#94A3B8;--sh:0 1px 3px rgba(15,23,42,.08);--r:10px;--r-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);padding:32px 24px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:860px;margin:0 auto;}
.header{margin-bottom:28px;}
.logo{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px;}
.logo span{color:var(--blue);}
.subtitle{font-size:13px;color:var(--text-3);}
.config-box{background:var(--amber-l);border:1px solid #FCD34D;border-radius:var(--r);padding:14px 18px;margin-bottom:24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.config-box.hidden{display:none;}
.config-box input{flex:1;min-width:200px;background:var(--white);border:1px solid var(--border-2);border-radius:var(--r-sm);color:var(--text);font-family:inherit;font-size:12.5px;padding:8px 12px;outline:none;}
.config-box input:focus{border-color:var(--blue);}
.config-label{font-size:12.5px;font-weight:600;color:#92400E;white-space:nowrap;}
.section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;box-shadow:var(--sh);overflow:hidden;}
.section-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.section-title{font-size:14px;font-weight:700;flex:1;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.item{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);}
.item:last-child{border-bottom:none;}
.item-check{margin-top:2px;accent-color:var(--blue);width:14px;height:14px;flex-shrink:0;cursor:pointer;}
.item-body{flex:1;}
.item-text{font-size:13.5px;color:var(--text-2);line-height:1.4;}
.item-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.tag-person{background:#EFF4FF;color:var(--blue);}
.tag-date{background:var(--amber-l);color:var(--amber);}
.tag-imp-critical{background:var(--red-l);color:var(--red);}
.tag-imp-major{background:var(--amber-l);color:var(--amber);}
.action-item{display:flex;align-items:center;gap:10px;padding:7px 16px 7px 36px;border-bottom:1px solid var(--border);background:#FAFBFC;}
.action-item:last-child{border-bottom:none;}
.action-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.actions-bar{display:flex;gap:10px;align-items:center;margin-top:24px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--r-sm);border:none;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn-primary{background:var(--blue);color:white;}
.btn-primary:hover{background:var(--blue-d);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:var(--white);color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border-2);}
.status{font-size:13px;padding:8px 14px;border-radius:var(--r-sm);display:none;font-weight:500;}
.status.ok{background:var(--green-l);color:var(--green);border:1px solid #A7F3D0;display:block;}
.status.error{background:var(--red-l);color:var(--red);border:1px solid #FECACA;display:block;}
.status.loading{background:var(--amber-l);color:var(--amber);border:1px solid #FDE68A;display:block;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">Mon<span>Focus</span> — Import Trello</div>
    <div class="subtitle">Board : <strong>Suivi global FSI</strong> &nbsp;·&nbsp; 16 projets &nbsp;·&nbsp; 25 actions &nbsp;·&nbsp; Décoche ce que tu ne veux pas importer</div>
  </div>
  <div class="config-box" id="config-box">
    <span class="config-label">⚙ URL Apps Script v4</span>
    <input type="text" id="script-url" placeholder="Colle ici l'URL de déploiement Apps Script v4…">
    <button class="btn btn-primary" style="padding:8px 16px;font-size:13px" onclick="saveUrl()">Enregistrer</button>
  </div>
  <div id="preview"></div>
  <div class="actions-bar">
    <button class="btn btn-primary" id="btn-import" onclick="doImport()">&#8679; Importer dans MonFocus v4</button>
    <button class="btn btn-ghost" onclick="selectAll()">Tout sélectionner</button>
    <button class="btn btn-ghost" onclick="selectNone()">Tout désélectionner</button>
    <div class="status" id="status"></div>
  </div>
</div>

var LS_KEY = 'monfocus_script_url';
var SCRIPT_URL = localStorage.getItem(LS_KEY) || '';
var cbCounter = 0;

if (SCRIPT_URL) document.getElementById('config-box').classList.add('hidden');

function saveUrl() {
  var v = document.getElementById('script-url').value.trim();
  if (!v) return;
  SCRIPT_URL = v;
  localStorage.setItem(LS_KEY, v);
  document.getElementById('config-box').classList.add('hidden');
}

var CAT_COLORS = {
  'Obj26 - Renta B2B':     {color:'#2563EB', label:'Renta B2B'},
  'Obj26 - Dev Solidspark':{color:'#0891B2', label:'Dev Solidspark'},
  'Obj26 - Dev Tertiaire': {color:'#10B981', label:'Dev Tertiaire'},
};

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtD(d) { if(!d)return''; var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }

function render() {
  var container = document.getElementById('preview');
  container.innerHTML = '';

  DATA.projects.forEach(function(p, pi) {
    var pa = DATA.actions.filter(function(a){return a.projectId == p.id;});
    var isPerso = p.name === 'Tâches personnelles';
    var color = isPerso ? '#64748B' : '#2563EB';

    var section = document.createElement('div');
    section.className = 'section';

    var countBadge = '<span class="badge" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44">'+
      (isPerso ? pa.length+' tâches' : pa.length+' action(s)') + '</span>';

    section.innerHTML = '<div class="section-head">'+
      '<div style="width:10px;height:10px;border-radius:50%;background:'+color+';flex-shrink:0"></div>'+
      '<div class="section-title">'+esc(p.name)+'</div>'+
      (p.responsable ? '<span class="badge tag-person">'+esc(p.responsable)+'</span>' : '')+
      (p.echeance ? '<span class="badge tag-date">📅 '+fmtD(p.echeance)+'</span>' : '')+
      countBadge+
      '</div>';

    // Ligne projet
    var pDiv = document.createElement('div');
    pDiv.className = 'item';
    pDiv.style.borderLeft = '3px solid '+color;
    pDiv.innerHTML = '<input type="checkbox" class="item-check proj-check" data-proj="'+pi+'" checked>'+
      '<div class="item-body"><div class="item-text" style="font-weight:600">'+esc(p.name)+'</div></div>';
    section.appendChild(pDiv);

    // Actions du projet
    pa.forEach(function(a, ai) {
      var globalAi = DATA.actions.indexOf(a);
      var aDiv = document.createElement('div');
      aDiv.className = 'action-item';
      var impTag = a.importance === 'critical' ? '<span class="badge tag-imp-critical">Critique</span>' :
                   a.importance === 'major'    ? '<span class="badge tag-imp-major">Majeure</span>' : '';
      aDiv.innerHTML = '<input type="checkbox" class="item-check action-check" data-proj="'+pi+'" data-action="'+globalAi+'" checked>'+
        '<div class="action-dot" style="background:'+color+'"></div>'+
        '<div class="item-text" style="flex:1">'+esc(a.name)+'</div>'+
        impTag+
        (a.echeance ? '<span class="badge tag-date" style="font-size:10px">📅 '+fmtD(a.echeance)+'</span>' : '');
      section.appendChild(aDiv);
    });

    container.appendChild(section);
  });
}

function selectAll()  { document.querySelectorAll('.item-check').forEach(function(c){c.checked=true;}); }
function selectNone() { document.querySelectorAll('.item-check').forEach(function(c){c.checked=false;}); }

document.addEventListener('change', function(e) {
  if (e.target.classList.contains('proj-check')) {
    var pi = e.target.dataset.proj;
    document.querySelectorAll('.action-check[data-proj="'+pi+'"]')
      .forEach(function(c){c.checked=e.target.checked;});
  }
});

// JSONP - identique à la v5
var cbCounter = 0;
function jsonp(url) {
  return new Promise(function(resolve, reject) {
    var cbName = '_mf_cb_' + (++cbCounter);
    var script = document.createElement('script');
    var timeout = setTimeout(function() {
      cleanup();
      reject(new Error('Timeout'));
    }, 10000);
    window[cbName] = function(data) {
      cleanup();
      if (data.error) reject(new Error(data.error));
      else resolve(data);
    };
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onerror = function() { cleanup(); reject(new Error('Script error')); };
    script.src = url + '&callback=' + cbName;
    document.head.appendChild(script);
  });
}
function apiGet(a) { return jsonp(SCRIPT_URL + '?action=' + a); }
function apiSave(a, d) { return jsonp(SCRIPT_URL + '?action=' + a + '&data=' + encodeURIComponent(JSON.stringify(d))); }

function setStatus(type, msg){
  var el=document.getElementById('status');
  el.className='status '+type; el.textContent=msg;
}

function doImport() {
  if (!SCRIPT_URL) { setStatus('error',"Configure d'abord l'URL Apps Script"); return; }
  var btn = document.getElementById('btn-import');
  btn.disabled = true;
  setStatus('loading','Connexion a MonFocus...');

  apiGet('getAll').then(function(res) {
    var existProjects = res.projects || [];
    var existActions  = res.actions  || [];

    // Projets cochés
    document.querySelectorAll('.proj-check:checked').forEach(function(cb) {
      var p = DATA.projects[cb.dataset.proj];
      if (!existProjects.find(function(x){return x.name===p.name;})) {
        existProjects.push({
          id:          p.id,
          name:        p.name,
          etiquettes:  p.etiquettes,
          responsable: p.responsable,
          echeance:    p.echeance,
          memo:        p.memo
        });
      }
    });

    // Actions cochées
    document.querySelectorAll('.action-check:checked').forEach(function(cb) {
      var a = DATA.actions[cb.dataset.action];
      if (!existActions.find(function(x){return x.name===a.name&&x.projectId==a.projectId;})) {
        existActions.push(a);
      }
    });

    setStatus('loading','Sauvegarde en cours...');
    return Promise.all([
      apiSave('saveProjects', existProjects),
      apiSave('saveActions',  existActions)
    ]);
  }).then(function() {
    setStatus('ok','Import réussi ! Ouvre MonFocus v4 et clique sur Sync.');
    btn.disabled = false;
  }).catch(function(e) {
    setStatus('error','Erreur : '+e.message);
    console.error(e);
    btn.disabled = false;
  });
}

render();
</script>
